<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Kartik_y21 Game</title>
    <link rel="stylesheet" href="style.css"> <style>
        /* Login page ke liye thodi alag styling container me */
        .toggle-text {
            margin-top: 20px;
            cursor: pointer;
            color: #06b6d4;
            text-decoration: underline;
        }
        input {
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

    <div id="particles-js"></div>

    <div class="container" style="width: 450px;">
        <h1 id="form-title" style="font-size: 2.5rem;">Player Login</h1>
        <p class="range" id="form-subtitle">Login to save your high scores</p>

        <input type="email" id="emailInput" placeholder="Enter your Email">
        <input type="password" id="passwordInput" placeholder="Enter your Password">
        
        <button id="mainBtn" onclick="handleAuth()">Login</button>
        
        <p class="toggle-text" id="toggleLink" onclick="toggleForm()">Don't have an account? Sign Up</p>
        
        <div id="message" style="color: #ef4444; font-size: 16px;"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script type="module" src="auth.js"></script>
</body>
</html>
